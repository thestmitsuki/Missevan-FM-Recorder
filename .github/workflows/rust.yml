name: Build and Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build EXE (release)
        run: |
          cd src-tauri
          cargo build --release

      - name: Create distribution package
        shell: pwsh
        run: |
          $version = (Get-Content -Path package.json | ConvertFrom-Json).version
          $packageDir = "missevan-recorder-v$version"
          
          New-Item -ItemType Directory -Path $packageDir -Force

          # 复制 EXE
          Copy-Item -Path "src-tauri/target/release/*.exe" -Destination $packageDir

          # 创建空文件夹
          New-Item -ItemType Directory -Path "$packageDir/config" -Force
          New-Item -ItemType Directory -Path "$packageDir/ffmpeg" -Force

          # 处理 README 文件
          $readmeSource = $null
          if (Test-Path "README.txt") {
              $readmeSource = "README.txt"
          } elseif (Test-Path "README.md") {
              $readmeSource = "README.md"
          }

          if ($readmeSource) {
              Copy-Item -Path $readmeSource -Destination "$packageDir/README.TXT"
          } else {
              # 生成默认 README（使用单行数组避免 here-string 缩进问题）
              $defaultReadme = @'
missevan-recorder
猫耳FM录制器

使用说明：
1. 将 ffmpeg 可执行文件放入 ffmpeg 文件夹
2. 运行 missevan-recorder.exe
3. 在软件中配置直播间 URL
'@
              $defaultReadme | Out-File -FilePath "$packageDir/README.TXT" -Encoding utf8
          }

          # 打包为 ZIP
          Compress-Archive -Path "$packageDir/*" -DestinationPath "$packageDir.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: missevan-recorder-package
          path: missevan-recorder-v*.zip
